name: Snyk Container

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '17 1 * * 0'

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Snyk CLI
      uses: snyk/actions/setup@master
      with:
        version: 'latest'  # or pin a specific version like '1.1020.0'


    - name: Build Docker image
      run: docker build -t burnettdev/adsb2otel .

    - name: Run Snyk to check Docker image for vulnerabilities
      continue-on-error: true
      uses: snyk/actions/docker@14818c4695ecc4045f33c9cee9e795a788711ca4
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        SNYK_API: https://api.eu.snyk.io
      with:
        image: burnettdev/adsb2otel
        args: --file=Dockerfile --sarif-file-output=snyk.sarif --severity-threshold=medium
        
    - name: Upload result to GitHub Code Scanning
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: snyk.sarif
